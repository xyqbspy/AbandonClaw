  <!-- 复习闭环小点（代表 review 回流） -->
  <circle cx="32" cy="20" r="2" fill="#ffffff" />
  <circle cx="34" cy="24" r="2" fill="#ffffff" />
  <circle cx="32" cy="28" r="2" fill="#ffffff" />
</svg>
