# =====================================================================
# AbandonClaw — Nginx reverse proxy with rate limit (production sample)
# =====================================================================
#
# Copy & adapt:
#   cp deploy/nginx.example.conf /etc/nginx/conf.d/abandonclaw.conf
#   cp deploy/nginx.proxy_common.example.conf /etc/nginx/conf.d/proxy_common.conf
#   # then edit:
#   #   - server_name             -> your domain
#   #   - ssl_certificate{,_key}  -> your cert paths
#   #   - 127.0.0.1:3000          -> your Next.js upstream if not localhost
#
# Then move the `limit_req_zone` / `limit_conn_zone` block below into
# your `nginx.conf` http {} block (zones MUST live in http, not server).
#
# Verify and reload:
#   nginx -t && nginx -s reload
#
# Background and rationale: docs/dev/incident-response-runbook.md §2.1
# Why this is M1-2 priority:  docs/dev/release-marginal-gaps.md §3 M1-2
# =====================================================================


# ---------------------------------------------------------------------
# 1. Limit zones — MOVE THIS BLOCK INTO /etc/nginx/nginx.conf http {}
# ---------------------------------------------------------------------
# limit_req_zone   $binary_remote_addr zone=api_general:10m   rate=60r/m;
# limit_req_zone   $binary_remote_addr zone=api_signup:10m    rate=5r/10m;
# limit_req_zone   $binary_remote_addr zone=api_high_cost:10m rate=20r/m;
# limit_conn_zone  $binary_remote_addr zone=conn_per_ip:10m;
#
# Tuning notes:
#   - api_signup window matches REGISTRATION_IP_LIMIT_WINDOW_SECONDS default (600s).
#     If you set REGISTRATION_IP_LIMIT_MAX_ATTEMPTS in env, keep Nginx at least as
#     strict (Nginx is the outer ring; the app is the inner ring).
#   - api_high_cost path regex below must stay in sync with high-cost capabilities
#     declared in src/lib/server/admin/high-cost.ts.


# ---------------------------------------------------------------------
# 2. Plain HTTP -> HTTPS redirect (recommended)
# ---------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example.com;

    # ACME challenge (Let's Encrypt / certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ---------------------------------------------------------------------
# 3. HTTPS reverse proxy with rate limit
# ---------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example.com;

    ssl_certificate     /etc/nginx/ssl/your-domain.pem;
    ssl_certificate_key /etc/nginx/ssl/your-domain.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ----- Body / timeout hygiene -----
    client_max_body_size 2m;
    client_body_timeout 30s;
    keepalive_timeout 30s;

    # ----- Header buffers (Supabase auth cookie 可能 8KB+，默认 buffer 不够会让登录过的浏览器直接 502) -----
    # Supabase 的 sb-<project>-auth-token 是 base64 编码的 JWT，带 refresh token 通常 4-8KB；
    # 加上其它 cookie / header 容易超过默认 large_client_header_buffers (4 8k)，
    # nginx 在请求头解析阶段就拒绝，根本到不了应用 → 用户以为项目挂了，但无痕模式能进。
    large_client_header_buffers 8 32k;
    client_header_buffer_size 16k;

    # ----- Per-IP concurrency cap (anti SYN half-open) -----
    limit_conn conn_per_ip 50;

    # ----- Site-wide baseline rate limit -----
    limit_req zone=api_general burst=30 nodelay;

    # ----- Signup: tighter window matches REGISTRATION_IP_LIMIT defaults -----
    location = /api/auth/signup {
        limit_req zone=api_signup burst=2 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # ----- High-cost API: must mirror server-side capability list -----
    location ~ ^/api/(practice|tts|scenes/generate|expression-map|explain-selection)/ {
        limit_req zone=api_high_cost burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # ----- Health probes bypass rate limit (Tencent CLB / PM2 health) -----
    location = /api/admin/status {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # ----- Default: forward to Next.js -----
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # ----- Rate-limit hit -> controlled 429 (mirror app-level shape) -----
    error_page 503 = @ratelimit;
    location @ratelimit {
        default_type application/json;
        return 429 '{"error":"Too many requests.","code":"RATE_LIMITED","details":null}';
    }

    # ----- Upstream unavailable -> 友好提示页（避免裸 nginx 错误页让用户以为项目挂了） -----
    # 502 多半是 PM2 进程未启动 / OOM / 应用启动中；503/504 多半是上游超时或繁忙。
    # 直接渲染 nginx 默认错误页会让用户看到 "502 Bad Gateway nginx/1.24.0"，体验很差。
    error_page 502 504 = @upstream_unavailable;
    location @upstream_unavailable {
        default_type text/html;
        charset utf-8;
        return 503 '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>服务暂时不可用</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;max-width:560px;margin:80px auto;padding:24px;color:#1f2937;line-height:1.6}h1{color:#111827;margin-top:0}ol{padding-left:20px}small{color:#6b7280}.tip{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin:18px 0}</style></head><body><h1>服务暂时不可用</h1><p>正在恢复中，请稍后再试。</p><div class="tip"><strong>如果你刷新依然看到此页面，并且无痕模式能正常访问</strong>，多半是浏览器残留的旧会话 Cookie 体积过大触发了网关限制，请尝试：</p><ol><li>在浏览器设置中清除本站 Cookie 后重新登录</li><li>或使用无痕窗口访问</li></ol></div><p><small>如长时间不恢复，请联系站点管理员。</small></p></body></html>';
    }
}
