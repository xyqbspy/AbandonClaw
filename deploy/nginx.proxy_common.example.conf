# Reusable proxy headers — include this from each upstream location.
#
# These headers must be present for the app to function correctly:
#   - X-Forwarded-For:   read by src/lib/server/rate-limit.ts getClientIp()
#   - X-Forwarded-Proto: needed for correct cookie Secure flag detection
#   - X-Request-Id:      propagates Nginx request id into the app for tracing

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Request-Id      $request_id;
proxy_read_timeout 60s;
proxy_send_timeout 60s;
proxy_buffering off;
